{% extends "base.html" %}
{% block title %}{{ equipment.name }}{% endblock %}
{% block content %}
<h2>{{ equipment.name }}</h2>
<dl class="row">
    <dt class="col-sm-2">Type</dt>
    <dd class="col-sm-10">{{ equipment.get_equipment_type_display }}</dd>
    <dt class="col-sm-2">Status</dt>
    <dd class="col-sm-10"><span class="badge {% if equipment.status == 'in-service' %}bg-success{% else %}bg-danger{% endif %}">{{ equipment.get_status_display }}</span></dd>
    <dt class="col-sm-2">Notes</dt>
    <dd class="col-sm-10">{{ equipment.notes|default:"—" }}</dd>
</dl>
<a href="{% url 'equipment-edit' equipment.pk %}" class="btn btn-primary">Edit</a>
<a href="{% url 'equipment-list' %}" class="btn btn-secondary">Back</a>
{% endblock %}
