{% extends "base.html" %}
{% block title %}New Client{% endblock %}
{% block content %}
<h2>New Client</h2>
<form method="post" class="row g-3">
    {% csrf_token %}
    {% for field in form %}
    <div class="col-md-6">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'client-search' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
