services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rsvr}
      POSTGRES_USER: ${POSTGRES_USER:-rsvr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rsvr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rsvr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rsvr}:${POSTGRES_PASSWORD:-rsvr}@db:5432/${POSTGRES_DB:-rsvr}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
