services:
  db:
    image: postgres:16.14-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rsvr}
      POSTGRES_USER: ${POSTGRES_USER:-rsvr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rsvr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rsvr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rsvr}:${POSTGRES_PASSWORD:-rsvr}@db:5432/${POSTGRES_DB:-rsvr}
      # Forces uv to use the system Python instead of looking for a virtualenv
      UV_SYSTEM_PYTHON: "true" 
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Prevents local .venv from leaking into the container
      - /app/.venv 


volumes:
  postgres_data:
